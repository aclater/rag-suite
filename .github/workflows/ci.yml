name: CI
on:
  push:
    branches: [main]
    paths: ["migrations/**"]
  pull_request:
    paths: ["migrations/**"]

jobs:
  lint-shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: migrations

  test-migrations:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ragsuite:ragsuite@localhost:5432/ragsuite
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Postgres image with pg_partman and pg_cron
        run: |
          docker build -t rag-postgres-ci -f Containerfile.postgres .

      - name: Start Postgres service container
        run: |
          docker run -d --name postgres \
            -p 5432:5432 \
            -e POSTGRES_USER=ragsuite \
            -e POSTGRES_PASSWORD=ragsuite \
            -e POSTGRES_DB=ragsuite \
            rag-postgres-ci
          # Wait for Postgres to be ready
          for i in $(seq 1 30); do
            if docker exec postgres pg_isready -U ragsuite 2>/dev/null; then
              echo "Postgres is ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Postgres failed to start"
              docker logs postgres
              exit 1
            fi
            sleep 1
          done

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run migrations
        run: bash migrations/run_migrations.sh

      - name: Run migration tests
        run: |
          pip install pytest psycopg2-binary
          pytest migrations/test_migrations.py -v
