name: CI
on:
  push:
    branches: [main]
    paths: ["migrations/**"]
  pull_request:
    paths: ["migrations/**"]

jobs:
  lint-shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: migrations

  test-migrations:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://litellm:litellm@localhost:5432/litellm
    services:
      postgres:
        # Pinned by digest (c9s stream, 2026-04-01) — no semver tags available
        image: quay.io/sclorg/postgresql-16-c9s@sha256:83dabb08e60b1896a8b97c0a56eabcbdc8ba4e91c70765639ea90e5e1f1a0db1
        env:
          POSTGRESQL_USER: litellm
          POSTGRESQL_PASSWORD: litellm
          POSTGRESQL_DATABASE: litellm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U litellm -d litellm"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run migrations
        run: bash migrations/run_migrations.sh

      - name: Run partition maintenance
        run: bash migrations/maintain-partitions.sh

      - name: Run migration tests
        run: |
          pip install pytest psycopg2-binary
          pytest migrations/test_migrations.py -v
